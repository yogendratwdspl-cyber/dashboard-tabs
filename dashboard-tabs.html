<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Dashboard</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        .card-hover:hover {
            transform: translateY(-5px);
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .icon-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 22px;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="row g-4">

        <!-- Revenue -->
        <div class="col-md-6 col-xl-3">
            <div class="card border-0 shadow-sm card-hover">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <p class="text-muted mb-1">Revenue</p>
                        <h4 class="fw-bold">₹2,45,000</h4>
                        <small class="text-success">+12% this month</small>
                    </div>
                    <div class="icon-box bg-success-subtle text-success">
                        <i class="bi bi-currency-rupee"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Orders -->
        <div class="col-md-6 col-xl-3">
            <div class="card border-0 shadow-sm card-hover">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <p class="text-muted mb-1">Orders</p>
                        <h4 class="fw-bold">1,320</h4>
                        <small class="text-danger">-3% today</small>
                    </div>
                    <div class="icon-box bg-danger-subtle text-danger">
                        <i class="bi bi-cart"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Customers -->
        <div class="col-md-6 col-xl-3">
            <div class="card border-0 shadow-sm card-hover">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <p class="text-muted mb-1">Customers</p>
                        <h4 class="fw-bold">890</h4>
                        <small class="text-success">+8% growth</small>
                    </div>
                    <div class="icon-box bg-primary-subtle text-primary">
                        <i class="bi bi-people"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Inventory -->
        <div class="col-md-6 col-xl-3">
            <div class="card border-0 shadow-sm card-hover">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <p class="text-muted mb-1">Inventory</p>
                        <h4 class="fw-bold">540 Items</h4>
                        <small class="text-warning">Low stock alert</small>
                    </div>
                    <div class="icon-box bg-warning-subtle text-warning">
                        <i class="bi bi-box-seam"></i>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
